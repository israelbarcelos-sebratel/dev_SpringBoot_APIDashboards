# Stack para o Portainer — builda as 2 APIs Java EM TEMPO DE DEPLOY.
#
# REQUISITOS:
#   - Deploy pelo método "Repository" (o Portainer clona o repo e executa o build).
#     O "Web editor" NÃO builda; Docker Swarm NÃO builda — use Docker standalone.
#   - As variáveis ${...} são preenchidas na aba "Environment variables" da stack.
#     NÃO comite senha aqui.

services:
  matrix-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: matrix-api
        PORT: "8091"
    image: matrix-api:local
    container_name: matrix-api
    ports:
      - "8091:8091"
    environment:
      SERVER_PORT: "8091"
      BFF_ORIGIN: "${MATRIX_BFF_ORIGIN:-http://localhost:4001}"
      DB_HOST: "${DB_HOST}"
      DB_PORT: "${DB_PORT:-3306}"
      DB_NAME: "${DB_NAME}"
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
    restart: unless-stopped

  native-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: native-api
        PORT: "8092"
    image: native-api:local
    container_name: native-api
    ports:
      - "8092:8092"
    environment:
      SERVER_PORT: "8092"
      BFF_ORIGIN: "${NATIVE_BFF_ORIGIN:-http://localhost:4002}"
      DB_HOST: "${DB_HOST}"
      DB_PORT: "${DB_PORT:-3306}"
      DB_NAME: "${DB_NAME}"
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
    restart: unless-stopped
