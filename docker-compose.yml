# Sobe as APIs Java em portas não ortodoxas a partir de 8091.
#   matrix-api -> 8091   |   native-api -> 8092
#
# Credenciais e host do banco vêm de um arquivo .env (NÃO versionado).
# Copie o modelo antes de subir:
#   cp .env.example .env   # e preencha DB_PASSWORD
#   docker compose up -d --build
#
# Para subir só uma das APIs:
#   docker compose up -d --build matrix-api

services:
  matrix-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: matrix-api
        PORT: "8091"
    image: matrix-api:local
    container_name: matrix-api
    ports:
      - "8091:8091"
    env_file: .env
    environment:
      SERVER_PORT: "8091"
      BFF_ORIGIN: "${MATRIX_BFF_ORIGIN:-http://localhost:4001}"
    restart: unless-stopped

  native-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: native-api
        PORT: "8092"
    image: native-api:local
    container_name: native-api
    ports:
      - "8092:8092"
    env_file: .env
    environment:
      SERVER_PORT: "8092"
      BFF_ORIGIN: "${NATIVE_BFF_ORIGIN:-http://localhost:4002}"
    restart: unless-stopped
