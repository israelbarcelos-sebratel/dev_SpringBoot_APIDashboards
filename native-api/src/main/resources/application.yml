server:
  port: ${SERVER_PORT:8082}

spring:
  datasource:
    url: jdbc:mariadb://${DB_HOST:10.0.11.171}:${DB_PORT:3306}/${DB_NAME:API_WebDeveloper}
    username: ${DB_USER:DevSebratel}
    password: ${DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 5000

app:
  db-schema: ${DB_NAME:API_WebDeveloper}
  cors-allowed-origin: ${BFF_ORIGIN:http://localhost:4002}
  group:
    name: native
    tables:
      - db_native
      - db_native_avaliations
      - db_native_login
      - db_native_stops
  # Semantic layer: same domains as matrix, but mapped to native's OWN columns (they differ).
  domains:
    atendimentos:
      titulo: Atendimentos
      descricao: Conversas e chamados recebidos pela operação.
      tabela: db_native
      unidade: atendimentos
      dimensoes:
        fila: fila
        atendente: agente
        sentido: sentido
        cidade: cidade_cliente
      # Colunas de duração ("HH:MM:SS") agregadas em média pelo endpoint /atendimentos/tempos:
      # 'espera' = tempo aguardando na fila, 'atendimento' = tempo de conversa com o agente.
      tempos:
        espera: espera
        atendimento: atendimento
    satisfacao:
      titulo: Satisfação
      descricao: Avaliações da pesquisa de satisfação respondida pelos clientes.
      tabela: db_native_avaliations
      unidade: avaliações
      notaColumn: nom_valor
      dimensoes:
        nota: nom_valor
        pergunta: nom_pergunta
        atendente: nom_agente
    pausas:
      titulo: Pausas
      descricao: Pausas dos atendentes — motivo e frequência.
      tabela: db_native_stops
      unidade: pausas
      dimensoes:
        motivo: pausa
        atendente: agente
        fila: fila
      # /pausas/duracao: o native guarda a duração como varchar "HH:MM:SS" em tempo_em_pausa;
      # 'hms' faz o TIME_TO_SEC no banco para o histograma sair em segundos.
      duracao:
        hms: tempo_em_pausa
    jornada:
      titulo: Jornada de trabalho
      descricao: Sessões e eventos de presença dos atendentes.
      tabela: db_native_login
      unidade: eventos
      dimensoes:
        atendente: agente
        evento: evento
        status: status
      # /jornada/duracao: o native não tem coluna de tempo logado; derivamos a duração da sessão
      # do intervalo entre início e fim (TIMESTAMPDIFF em segundos). Sessões abertas (fim nulo) saem.
      duracao:
        inicio: data_hora_inicio
        fim: data_hora_fim
